<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chris Gantt | Arbor Lake Community Liaison</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0c0d;      
            --bg-panel: #161a1d;     
            --teal: #3bbab1;         
            --gold: #d4a350;         
            --text-main: #e8e6e3;    
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            line-height: 1.7;
            scroll-behavior: smooth;
        }

        h1, h2, h3, h4 { font-family: 'Playfair Display', serif; font-weight: 700; color: var(--white); }

        /* Navigation - Dark Mode */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1rem 10%;
            background: rgba(10, 12, 13, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 3px solid var(--teal);
            box-shadow: 0 4px 20px rgba(59, 186, 177, 0.15); 
        }

        .nav-logo-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: 0.3s;
        }

        .nav-logo-link:hover { opacity: 0.8; }

        .actual-logo {
            height: 65px; 
            width: auto;
            background-color: var(--white);
            padding: 5px 15px;
            border-radius: 6px;
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-links a { 
            text-decoration: none; 
            color: var(--text-main); 
            font-size: 0.8rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            transition: color 0.3s;
        }
        .nav-links a:hover { color: var(--teal); }

        /* Hero Section */
        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 10%;
            background: radial-gradient(circle at center, #1a2327 0%, var(--bg-deep) 100%);
            border-bottom: 1px solid rgba(59, 186, 177, 0.2);
        }

        .hero-label { color: var(--teal); text-transform: uppercase; letter-spacing: 4px; font-weight: 600; font-size: 0.9rem; margin-bottom: 1.5rem; display: block; }
        header h1 { font-size: 5.5rem; line-height: 0.9; margin-bottom: 1.5rem; color: var(--white); }
        .hero-sub { font-size: 1.8rem; color: var(--white); font-family: 'Playfair Display', serif; font-style: italic; margin-bottom: 0.5rem; }
        .hero-tagline { font-size: 1.3rem; color: var(--gold); font-weight: 600; margin-bottom: 2rem; }

        /* About Section */
        #about { padding: 140px 10%; background-color: var(--bg-panel); }
        .section-title { font-size: 3.5rem; margin-bottom: 1.5rem; color: var(--white); text-align: left; }
        .accent-line { width: 100px; height: 6px; background: var(--teal); margin-bottom: 3rem; }

        .about-content { display: grid; grid-template-columns: 1fr 1.4fr; gap: 5rem; align-items: start; }
        
        .profile-img {
            width: 100%;
            max-width: 450px;
            border-radius: 8px;
            box-shadow: -15px 15px 0px var(--teal); 
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .about-text p { font-size: 1.25rem; color: var(--text-main); margin-bottom: 2rem; }
        .highlight-name { color: var(--teal); font-weight: 600; }

        .focus-list { list-style: none; margin-top: 2rem; }
        .focus-list li { margin-bottom: 1.2rem; font-weight: 600; font-size: 1.1rem; padding-left: 25px; position: relative; color: var(--white); }
        .focus-list li::before { content: "•"; color: var(--teal); position: absolute; left: 0; font-size: 1.5rem; }

        /* Coverage Areas Section */
        #coverage { padding: 120px 10%; background-color: var(--bg-deep); }
        .section-header-center { text-align: center; margin-bottom: 4rem; }
        .coverage-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; }
        
        .coverage-card { 
            border: 1px solid rgba(59, 186, 177, 0.3); 
            padding: 3.5rem; 
            transition: 0.4s; 
            background: var(--bg-panel);
            border-radius: 6px;
        }
        .coverage-card:hover { border-color: var(--teal); transform: scale(1.02); background: #1c2126; box-shadow: 0 10px 30px rgba(59, 186, 177, 0.1); }
        .coverage-card h3 { color: var(--teal); font-size: 2rem; margin-bottom: 1rem; }

        /* Senior Center Outreach Section */
        #outreach { padding: 120px 10%; background-color: var(--bg-panel); border-top: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .outreach-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; }
        .outreach-card {
            background: var(--bg-deep); 
            padding: 3.5rem; 
            transition: 0.3s; 
            border-radius: 6px; 
            border-bottom: 4px solid var(--gold);
        }
        .outreach-card:hover { transform: translateY(-5px); border-bottom-color: var(--teal); }
        .outreach-card h3 { color: var(--white); font-size: 1.8rem; margin-bottom: 1rem; }

        /* Expertise Section */
        #expertise { padding: 140px 10%; background-color: var(--bg-deep); }
        .expertise-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2rem; }
        .card { padding: 3rem; background: var(--bg-panel); border-bottom: 5px solid transparent; transition: 0.3s; border-radius: 6px; }
        .card:hover { border-bottom-color: var(--teal); transform: translateY(-5px); }
        .card h4 { color: var(--gold); font-size: 1.5rem; margin-bottom: 1rem; }

        /* Advanced Contact Board */
        #contact { padding: 140px 10%; background-color: var(--bg-panel); border-top: 5px solid var(--teal); }
        .contact-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 3rem; }
        
        .contact-box { background: var(--bg-deep); padding: 3rem; border-top: 4px solid var(--teal); border-radius: 6px; }
        .contact-box h3 { color: var(--white); font-size: 1.6rem; margin-bottom: 1.5rem; font-family: 'Playfair Display', serif; }
        .contact-box p, .contact-box a { font-size: 1.1rem; color: var(--text-main); text-decoration: none; display: block; margin-bottom: 0.8rem; }
        .contact-box a.highlight { font-weight: 700; color: var(--teal); font-size: 1.2rem; }
        .contact-box a.highlight:hover { color: var(--white); }

        /* Facebook Button with Icon CSS */
        .fb-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: #1877F2;
            color: #ffffff !important;
            padding: 10px 20px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            text-decoration: none;
            border-radius: 4px;
            margin-top: 1rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: background-color 0.3s, transform 0.2s;
        }
        .fb-button:hover { background-color: #166fe5; transform: translateY(-2px); }
        .fb-icon { width: 22px; height: 22px; fill: #ffffff; }

        footer { padding: 4rem 10%; background: var(--bg-deep); color: rgba(255,255,255,0.4); font-size: 0.85rem; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); }

        @media (max-width: 900px) {
            .nav-links { display: none; }
        }
        @media (max-width: 768px) {
            header h1 { font-size: 3.5rem; }
            .about-content { grid-template-columns: 1fr; }
        }
    </style>
</head>
