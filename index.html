<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chris Gantt | Arbor Lake Community Liaison</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #f4f7f6;      
            --bg-panel: #ffffff;     
            --teal: #1e7a75;         
            --teal-light: #e6f2f1;   
            --gold: #b8860b;         
            --text-main: #4a5568;    
            --text-dark: #1a202c;    
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            line-height: 1.7;
            scroll-behavior: smooth;
        }

        h1, h2, h3, h4 { font-family: 'Playfair Display', serif; font-weight: 700; color: var(--text-dark); }

        /* Navigation - Light Mode */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1rem 10%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 3px solid var(--teal);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); 
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .nav-logo-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: 0.3s;
        }

        .nav-logo-link:hover { opacity: 0.7; }

        .actual-logo {
            height: 65px; 
            width: auto;
            border-radius: 6px;
        }

        .click-hint {
            font-size: 0.65rem;
            color: var(--teal);
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            transition: color 0.3s;
        }

        .nav-logo-link:hover + .click-hint { color: var(--text-dark); }

        .nav-links { display: flex; gap: 2rem; }
        .nav-links a { 
            text-decoration: none; 
            color: var(--text-dark); 
            font-size: 0.8rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            transition: color 0.3s;
        }
        .nav-links a:hover { color: var(--teal); }

        /* Split-Screen Hero Section */
        header {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 120px 10% 40px;
            background: linear-gradient(135deg, var(--bg-page) 0%, var(--bg-panel) 100%);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            gap: 4rem;
        }

        .hero-text { flex: 1; }
        .hero-label { color: var(--teal); text-transform: uppercase; letter-spacing: 4px; font-weight: 700; font-size: 0.9rem; margin-bottom: 1.5rem; display: block; }
        .hero-text h1 { font-size: 5.5rem; line-height: 0.9; margin-bottom: 1.5rem; color: var(--text-dark); }
        .hero-sub { font-size: 1.8rem; color: var(--text-dark); font-family: 'Playfair Display', serif; font-style: italic; margin-bottom: 0.5rem; }
        .hero-tagline { font-size: 1.3rem; color: var(--gold); font-weight: 600; margin-bottom: 2rem; }
        .hero-desc { max-width: 550px; font-size: 1.1rem; color: var(--text-main); }

        .hero-visual { flex: 0.8; position: relative; }
        .hero-visual::before {
            content: '';
            position: absolute;
            top: 25px;
            left: -25px;
            width: 100%;
            height: 100%;
            background: var(--teal-light);
            border-radius: 8px;
            z-index: 0;
        }
        .profile-img {
            width: 100%;
            max-width: 500px;
            border-radius: 8px;
            object-fit: cover;
            position: relative;
            z-index: 1;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        /* Centered About Section */
        #about { padding: 120px 10%; background-color: var(--bg-panel); text-align: center; }
        .about-inner { max-width: 1000px; margin: 0 auto; }
        .section-title { font-size: 3.5rem; margin-bottom: 1.5rem; color: var(--text-dark); }
        .accent-line-center { width: 100px; height: 6px; background: var(--teal); margin: 0 auto 3rem; border-radius: 3px; }
        
        .about-text p { font-size: 1.25rem; color: var(--text-main); margin-bottom: 1.5rem; max-width: 800px; margin-left: auto; margin-right: auto; }

        /* Admissions Team Grid */
        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 4rem;
            text-align: left;
        }
        .team-card {
            background: var(--bg-page);
            padding: 2.5rem;
            border-radius: 8px;
            border-left: 4px solid var(--teal);
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .team-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(30, 122, 117, 0.08);
        }
        .team-card h4 { font-size: 1.4rem; margin-bottom: 0.3rem; color: var(--text-dark); }
        .team-card .role { display: block; font-size: 0.85rem; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 1rem; }
        .team-card p { font-size: 1.05rem; margin-bottom: 0; }

        /* Coverage Areas Section */
        #coverage { padding: 120px 10%; background-color: var(--bg-page); }
        .section-header-center { text-align: center; margin-bottom: 4rem; }
        .coverage-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; }
        
        .coverage-card { 
            border: 1px solid rgba(0, 0, 0, 0.05); 
            padding: 3.5rem; 
            transition: 0.4s; 
            background: var(--bg-panel);
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.02);
        }
        .coverage-card:hover { border-color: var(--teal); transform: translateY(-10px); box-shadow: 0 15px 30px rgba(30, 122, 117, 0.08); }
        .coverage-card h3 { color: var(--teal); font-size: 2rem; margin-bottom: 1rem; }

        /* Community Outreach Section */
        #outreach { padding: 120px 10%; background-color: var(--bg-panel); border-top: 1px solid rgba(0,0,0,0.03); border-bottom: 1px solid rgba(0,0,0,0.03); }
        .outreach-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 3rem; }
        .outreach-card {
            background: var(--bg-page); 
            padding: 3.5rem; 
            transition: 0.3s; 
            border-radius: 8px; 
            border-left: 6px solid var(--gold);
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
        }
        .outreach-card:hover { border-left-color: var(--teal); transform: translateY(-5px); box-shadow: 0 15px 25px rgba(0,0,0,0.06); }
        .outreach-card h3 { color: var(--text-dark); font-size: 1.5rem; margin-bottom: 1rem; line-height: 1.3; }

        /* Expertise Section */
        #expertise { padding: 140px 10%; background-color: var(--bg-page); }
        .expertise-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2rem; }
        .card { padding: 3rem; background: var(--bg-panel); border-bottom: 5px solid transparent; transition: 0.3s; border-radius: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.03); }
        .card:hover { border-bottom-color: var(--teal); transform: translateY(-5px); box-shadow: 0 15px 30px rgba(30, 122, 117, 0.08); }
        .card h4 { color: var(--gold); font-size: 1.5rem; margin-bottom: 1rem; }

        /* Contact Board */
        #contact { padding: 140px 10%; background-color: var(--bg-panel); border-top: 5px solid var(--teal); }
        .contact-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 3rem; }
        
        .contact-box { background: var(--bg-page); padding: 3rem; border-top: 4px solid var(--teal); border-radius: 8px; box-shadow: 0 10px 20px rgba(0,0,0,0.03); border-left: 1px solid rgba(0,0,0,0.03); border-right: 1px solid rgba(0,0,0,0.03); border-bottom: 1px solid rgba(0,0,0,0.03); }
        .contact-box h3 { color: var(--text-dark); font-size: 1.6rem; margin-bottom: 1.5rem; font-family: 'Playfair Display', serif; }
        .contact-box p, .contact-box a { font-size: 1.1rem; color: var(--text-main); text-decoration: none; display: block; margin-bottom: 0.8rem; }
        .contact-box a.highlight { font-weight: 700; color: var(--teal); font-size: 1.2rem; }
        .contact-box a.highlight:hover { color: var(--text-dark); }

        /* QR Code & Facility Links */
        .facility-link { margin-top: 1rem; font-weight: 700; color: var(--gold); text-decoration: none; display: inline-block; }
        .facility-link:hover { color: var(--text-dark); }
        
        .qr-wrapper { margin-top: 1.5rem; margin-bottom: 1.5rem; }
        .qr-text { font-size: 0.8rem; color: var(--teal); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-bottom: 8px; display: block; }
        .qr-image { border-radius: 4px; width: 110px; height: 110px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 2px
