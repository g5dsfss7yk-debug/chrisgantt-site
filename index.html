<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chris Gantt — Strategic Healthcare Liaison</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1a1a1a;
            --gold: #c5a059;
            --cream: #f9f7f2;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--cream);
            color: var(--ink);
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.5rem 10%;
            background: rgba(249, 247, 242, 0.95);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid rgba(197, 160, 89, 0.2);
        }

        .nav-logo-container {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .nav-logo-img {
            height: 3.5rem; /* Scaled for a clean nav bar */
            width: auto;
        }

        .nav-links a {
            margin-left: 2rem;
            text-decoration: none;
            color: var(--ink);
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--gold);
        }

        /* Hero Section */
        header {
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr; /* 50/50 split for text and photo */
            align-items: center;
            padding: 0 10%;
            background: var(--cream);
        }

        .hero-text {
            max-width: 600px;
        }

        header h1 {
            font-size: 4rem;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            max-width: 800px;
        }

        .hero-sub {
            font-size: 1.2rem;
            max-width: 600px;
            margin-bottom: 2.5rem;
            color: #4a4a4a;
        }

        .btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            background-color: var(--ink);
            color: var(--white);
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.3s, background-color 0.3s;
        }

        .btn:hover {
            background-color: var(--gold);
            transform: translateY(-3px);
        }

        /* Swapped Monogram Panel for Headshot */
        .hero-image-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-profile-img {
            width: 80%; /* Prominent but scaled portrait */
            max-width: 400px;
            border-radius: 50%; /* Soft circular profile panel */
            border: 4px solid rgba(197, 160, 89, 0.3); /* Soft gold accent border */
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* About Section */
        #about {
            padding: 100px 10%;
            background-color: var(--white);
        }

        .section-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .stat-box h3 {
            font-size: 2rem;
            color: var(--gold);
            margin-bottom: 0.5rem;
        }

        .stat-box p {
            color: #4a4a4a;
        }

        /* Expertise Grid */
        #expertise {
            padding: 100px 10%;
        }

        .expertise-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .card {
            background: var(--white);
            padding: 2.5rem;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .card:hover {
            border-color: var(--gold);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .card h3 {
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }

        .card p {
            color: #4a4a4a;
        }

        /* Contact Section */
        #contact {
            padding: 100px 10%;
            background-color: var(--ink);
            color: var(--white);
            text-align: center;
        }

        #contact h2 {
            font-size: 3rem;
            margin-bottom: 2rem;
        }

        .email-link {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--gold);
            text-decoration: none;
            display: block;
            margin-bottom: 3rem;
        }

        footer {
            padding: 2rem 10%;
            background: var(--ink);
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        @media (max-width: 768px) {
            header { grid-template-columns: 1fr; text-align: center; height: auto; padding: 100px 10% 50px 10%; }
            header h1 { font-size: 2.5rem; }
