<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chris Gantt | Arbor Lake Community Liaison</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #f4f7f6;      
            --bg-panel: #ffffff;     
            --teal: #1e7a75;         
            --teal-light: #e6f2f1;   
            --gold: #b8860b;         
            --text-main: #4a5568;    
            --text-dark: #1a202c;    
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            line-height: 1.7;
            scroll-behavior: smooth;
        }

        h1, h2, h3, h4 { font-family: 'Playfair Display', serif; font-weight: 700; color: var(--text-dark); }

        /* Navigation - Light Mode */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1rem 10%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 3px solid var(--teal);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); 
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .nav-logo-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: 0.3s;
        }

        .nav-logo-link:hover { opacity: 0.7; }

        .actual-logo {
            height: 65px; 
            width: auto;
            border-radius: 6px;
        }

        .click-hint {
            font-size: 0.65rem;
            color: var(--teal);
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            transition: color 0.3s;
        }
