<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chris Gantt | Arbor Lake SNF Liaison</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0d0e0f; 
            --gold: #b38b45; 
            --teal: #598c94; /* The teal from your logo */
            --cream: #f2eee6; /* Richer, fuller cream */
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--cream);
            color: var(--ink);
            line-height: 1.7;
            scroll-behavior: smooth;
        }

        h1, h2, h3, h4 { font-family: 'Playfair Display', serif; font-weight: 700; }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.2rem 10%;
            background: var(--ink);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 3px solid var(--teal);
        }

        .nav-logo-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: 0.3s;
        }

        .nav-logo-link:hover { opacity: 0.8; }

        .logo-img {
            height: 65px; /* Sized specifically for your logo */
            width: auto;
        }

        .nav-links a { 
            margin-left: 2rem; 
            text-decoration: none; 
            color: var(--white); 
            font-size: 0.85rem; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
        }
        .nav-links a:hover { color: var(--gold); }

        /* Hero Section */
        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 10%;
            background: linear-gradient(135deg, var(--cream) 0%, #e0ddd3 100%);
            border-bottom: 1px solid rgba(179, 139, 69, 0.2);
        }

        .hero-label { color: var(--teal); text-transform: uppercase; letter-spacing: 4px; font-weight: 600; font-size: 0.95rem; margin-bottom: 1.5rem; display: block; }
        header h1 { font-size: 5.5rem; line-height: 0.9; margin-bottom: 1.5rem; color: var(--ink); }
        .hero-sub { font-size: 1.8rem; color: var(--ink); font-family: 'Playfair Display', serif; font-style: italic; margin-bottom: 2rem; }

        /* About Section */
        #about { padding: 140px 10%; background-color: var(--white); }
        .section-title { font-size: 3.5rem; margin-bottom: 1.5rem; color: var(--ink); }
        .accent-line { width: 100px; height: 6px; background: var(--teal); margin-bottom: 3rem; }

        .about-content { display: grid; grid-template-columns: 1.4fr 1fr; gap: 6rem; }
        .about-text p { font-size: 1.25rem; color: #222; margin-bottom: 2rem; }

        .focus-box {
            background: var(--ink);
            color: var(--white);
            padding: 3.5rem;
            border-left: 6px solid var(--gold);
        }

        .focus-list { list-style: none; }
        .focus-list li { margin-bottom: 1.2rem; font-weight: 700; color: var(--white); padding-left: 25px; position: relative; font-size: 1.1rem; }
        .focus-list li::before { content: "›"; color: var(--teal); position: absolute; left: 0; font-size: 1.8rem; top: -8px; }

        /* Metro Areas - The Request for "Fullness" */
        #metro { padding: 120px 10%; background-color: var(--ink); color: var(--white); }
        .metro-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2.5rem; margin-top: 4rem; }
        .metro-card { border: 1px solid rgba(89, 140, 148, 0.4); padding: 3.5rem; transition: 0.4s; background: rgba(255,255,255,0.02); }
        .metro-card:hover { border-color: var(--gold); transform: translateY(-5px); background: rgba(255,255,255,0.05); }
        .metro-card h3 { color: var(--gold); font-size: 2.2rem; margin-bottom: 1rem; }

        /* Expertise */
        #expertise { padding: 140px 10%; background-color: var(--cream); }
        .expertise-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; }
        .card { padding: 3rem; background: var(--white); box-shadow: 0 15px 40px rgba(0,0,0,0.05); transition: 0.3s; border-bottom: 6px solid transparent; }
        .card:hover { border-bottom-color: var(--teal); }
        .card h4 { color: var(--teal); font-size: 1.5rem; margin-bottom: 1rem; }

        /* Contact Section */
        #contact { padding: 140px 10%; background-color: var(--white); text-align: center; border-top: 6px solid var(--teal); }
        .contact-email { font-family: 'Playfair Display', serif; font-size: 3.5rem; color: var(--ink); text-decoration: none; display: block; margin-bottom: 1rem; transition: 0.3s; }
        .contact-email:hover { color: var(--teal); }
        .contact-phone { font-size: 2rem; color: var(--gold); text-decoration: none; font-weight: 700; display: block; margin-bottom: 3rem; }

        footer { padding: 4rem 10%; background: var(--ink); color: rgba(255,255,255,0.3); font-size: 0.85rem; text-align: center; border-top: 1px solid rgba(255,255,255,0.1); }

        @media (max-width: 768px) {
            header h1 { font-size: 3.5rem; }
            .about-content { grid-template-columns: 1fr; }
            .contact-email { font-size: 1.8rem; }
            .nav-links { display: none; }
        }
    </style>
</head>
